packages:
  - apps/*
  - packages/*
peerDependencyRules:
  allowedVersions:
    # Packages that haven't published React 19-compatible versions yet
    # but work fine at runtime with React 19:
    react-fast-marquee>react: ">=19"
    react-fast-marquee>react-dom: ">=19"
    react-page-visibility>react: ">=19"
    react-recompose>react: ">=19"
    "@tylermenezes/cognitoforms-react>react": ">=19"

    # transitive deps of react-responsive-modal v7
    "@bedrock-layout/use-forwarded-ref>react": ">=19"
    "@bedrock-layout/use-stateful-ref>react": ">=19"
allowBuilds:
  core-js: true
  ejs: true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
catalog:
  "@chakra-ui/react": "^3.34.0"
  "@emotion/react": "^11"
  "@emotion/styled": "^11"
  "@types/node": "^25.5.0"
  "@types/react": "^19.2.14"
  "@types/react-dom": "^19.2.3"
  eslint: "^8.35.0"
  graphql: "^16.0.1"
  next: "16.0.10"
  "@wrksz/themes": "^0.1.0"
  prop-types: "^15.7.2"
  react: "^19.0.0"
  react-dom: "^19.0.0"
  typescript: "^6.0.2"
